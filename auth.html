<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome | StyleAI</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    body {
      background: var(--beige);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
      width: 100%;
    }

    .auth-left {
      background: var(--maroon);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 50px;
      position: relative;
      overflow: hidden;
    }

    .auth-left::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      border: 80px solid rgba(217, 111, 50, 0.15);
      top: -100px;
      right: -100px;
    }

    .auth-left::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 60px solid rgba(245, 239, 230, 0.08);
      bottom: -80px;
      left: -60px;
    }

    .auth-brand {
      font-family: 'Playfair Display', serif;
      font-size: 52px;
      font-weight: 700;
      color: var(--beige);
      line-height: 1.1;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .auth-brand span { color: var(--orange); }

    .auth-tagline {
      color: rgba(245, 239, 230, 0.75);
      font-size: 16px;
      font-weight: 300;
      line-height: 1.6;
      max-width: 320px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .auth-features {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .feature-chip {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(245, 239, 230, 0.1);
      border: 1px solid rgba(245, 239, 230, 0.2);
      padding: 12px 20px;
      border-radius: 50px;
      color: var(--beige);
      font-size: 14px;
    }

    .feature-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--orange);
      flex-shrink: 0;
    }

    .auth-right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: var(--beige);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 20px;
      padding: 44px 40px;
      box-shadow: 0 8px 40px rgba(122, 31, 43, 0.1);
    }

    .auth-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--maroon);
      margin-bottom: 6px;
    }

    .auth-card p.subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      background: var(--beige);
      border-radius: 10px;
      padding: 4px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #888;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--maroon);
      color: white;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .field input {
      margin: 0;
    }

    .submit-btn {
      width: 100%;
      background: var(--maroon);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.15s;
    }

    .submit-btn:hover {
      background: var(--maroon-dark);
      transform: translateY(-1px);
    }

    #authMessage {
      min-height: 20px;
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      font-weight: 500;
    }

    .error { color: #c0392b; }
    .success { color: #27ae60; }

    @media (max-width: 768px) {
      .auth-wrapper { grid-template-columns: 1fr; }
      .auth-left { display: none; }
    }
  </style>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-left">
    <div class="auth-brand">Style<span>AI</span></div>
    <p class="auth-tagline">Your personal AI stylist. Outfits crafted just for you — your body, your tone, your vibe.</p>
    <div class="auth-features">
      <div class="feature-chip"><span class="dot"></span>Personalised outfit picks</div>
      <div class="feature-chip"><span class="dot"></span>Skin-tone aware colour palette</div>
      <div class="feature-chip"><span class="dot"></span>Occasion-based styling</div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in or create your style profile</p>

      <div class="tabs">
        <div id="tabLogin" class="tab active" onclick="switchTab('login')">Login</div>
        <div id="tabRegister" class="tab" onclick="switchTab('register')">Register</div>
      </div>

      <!-- LOGIN -->
      <div id="loginSection">
        <div class="field">
          <label>Email</label>
          <input id="loginEmail" type="email" placeholder="you@email.com" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="loginPassword" type="password" placeholder="Your password" />
        </div>
        <button class="submit-btn" onclick="doLogin()">Sign In</button>
      </div>

      <!-- REGISTER -->
      <div id="registerSection" class="hidden">
        <div class="field">
          <label>Full Name</label>
          <input id="regName" placeholder="Priya Sharma" />
        </div>
        <div class="field">
          <label>Email</label>
          <input id="regEmail" type="email" placeholder="you@email.com" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="regPassword" type="password" placeholder="Create a password" />
        </div>
        <button class="submit-btn" onclick="doRegister()">Create Account</button>
      </div>

      <div id="authMessage"></div>
    </div>
  </div>
</div>

<script>
  function switchTab(mode) {
    document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
    document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
    document.getElementById('loginSection').classList.toggle('hidden', mode !== 'login');
    document.getElementById('registerSection').classList.toggle('hidden', mode !== 'register');
    setMsg('');
  }

  function setMsg(text, isError = false) {
    const el = document.getElementById('authMessage');
    el.textContent = text;
    el.className = isError ? 'error' : 'success';
  }

  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return setMsg('Please fill in all fields', true);

    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) return setMsg(data.error || 'Login failed', true);

    setMsg('Welcome back! Redirecting...');
    setTimeout(() => {
      window.location.href = data.isNewUser ? 'questionnaire.html' : 'questionnaire.html?returning=1';
    }, 800);
  }

  async function doRegister() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!name || !email || !password) return setMsg('Please fill in all fields', true);

    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!res.ok) return setMsg(data.error || 'Registration failed', true);

    setMsg('Account created! Setting up your profile...');
    setTimeout(() => { window.location.href = 'questionnaire.html'; }, 800);
  }
</script>
</body>
</html>
