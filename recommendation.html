<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Outfit Recommendation</title>

  <style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f7f5f2;
    margin: 0;
    padding: 30px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    text-align: center;
    color: #7a1f2b;
    margin-bottom: 25px;
  }

  select, button {
    padding: 10px 14px;
    margin: 10px;
    font-size: 14px;
    border-radius: 6px;
  }

  select {
    border: 1px solid #ddd;
  }

  button {
    background: #7a1f2b;
    color: white;
    border: none;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #d96f32;
  }

  .container {
    max-width: 950px;
    margin: auto;
    text-align: center;
  }

  /* RESULT CARD */
  .result-box {
    background: white;
    margin-top: 30px;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    display: none;
  }

  /* IMAGE GRID */
  .image-grid {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 25px;
  }

  .card {
    width: 240px;
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    transition: transform 0.3s;
  }

  .card:hover {
    transform: translateY(-6px);
  }

  .card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
  }

  .card p {
    margin: 10px;
    font-size: 14px;
    color: #555;
  }

  /* DETAILS GRID */
  .info {
    display: grid;
    gap: 14px;
    text-align: left;
  }

  .info p {
    margin: 0;
    font-size: 14px;
    line-height: 1.6;
    background: #fafafa;
    padding: 12px;
    border-radius: 10px;
  }

  .label {
    font-weight: bold;
    color: #7a1f2b;
  }

  /* Highlight Styling Tips */
  #tips {
    display: block;
  }

  .info p:last-child {
    background: linear-gradient(135deg, #fff3e8, #ffe0cc);
    border-left: 4px solid #d96f32;
  }
</style>
</head>

<body>

  <div class="container">

    <h1>Outfit Recommendation</h1>

  <div style="margin-bottom:20px;">
  <select id="occasion">
    <option value="casual">Casual</option>
    <option value="formal">Formal</option>
    <option value="party">Party</option>
  </select>

  <button onclick="generateRecommendation()">Generate Recommendation</button>
</div>

    <!-- RESULT -->
    <div class="result-box" id="resultBox">

      <!-- IMAGES -->
      <div class="image-grid">
        <div class="card">
          <img id="img1" src="" alt="Outfit 1">
          <p>Outfit 1</p>
        </div>

        <div class="card">
          <img id="img2" src="" alt="Outfit 2">
          <p>Outfit 2</p>
        </div>
      </div>

      <!-- DETAILS -->
      <div class="info">
        <p><span class="label">Outfit:</span> <span id="outfit"></span></p>
        <p><span class="label">Accessories:</span> <span id="accessories"></span></p>
        <p><span class="label">Colors:</span> <span id="colors"></span></p>
        <p><span class="label">Fabrics:</span> <span id="fabrics"></span></p>
        <p><span class="label">Styling Tips:</span> <span id="tips"></span></p>
      </div>

    </div>

  </div>

  <script>
    async function generateRecommendation() {
      const occasion = document.getElementById("occasion").value;

      try {
        const res = await fetch("/api/recommendations", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ occasion })
        });

        const data = await res.json();

        if (!data.recommendation) {
          alert("Failed to get recommendation");
          return;
        }

        const r = data.recommendation;

        // SHOW BOX
        document.getElementById("resultBox").style.display = "block";

        // TEXT
        document.getElementById("outfit").innerText =
          r.outfitRecommendation.join(", ");

        document.getElementById("accessories").innerText =
          r.accessorySuggestions.join(", ");

        document.getElementById("colors").innerText =
          r.recommendedColorPalette.join(", ");

        document.getElementById("fabrics").innerText =
          r.suitableFabrics.join(", ");

        document.getElementById("tips").innerText =
          r.stylingTips.join(" | ");

        // IMAGES (IMPORTANT FIX)
        if (r.outfitImages && r.outfitImages.length >= 2) {
          document.getElementById("img1").src = "/" + r.outfitImages[0];
          document.getElementById("img2").src = "/" + r.outfitImages[1];
        }

      } catch (err) {
        console.error(err);
        alert("Error occurred. Check console.");
      }
    }
  </script>

</body>
</html>
```
