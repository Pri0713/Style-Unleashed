<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Style Unleashed Landing Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="canvas" aria-label="FFFinalll landing page">
        <div class="hero-bg base-maroon"></div>
        <div class="hero-bg deep-maroon"></div>
        <div class="hero-bg accent-red"></div>
        <img src="assets/hero-model.png" alt="" class="hero-model" />
        <h1 class="hero-title">STYLE<br />UNLEASHED</h1>

        <h2 class="tagline">confidence is your<br />signature</h2>
        <button
          class="cta"
          type="button"
          onclick="window.location.href='auth.html'"
        >
          start styling
        </button>

        <div class="card card-skin">
          <img src="assets/skin-tone-main.png" alt="" class="skin-main" />
          <h3>for every skin tone</h3>
          <p>Inclusive fashion for all shades and undertones</p>
        </div>

        <div class="card card-occasion">
          <h3>Occasion Based Styling</h3>
          <img src="assets/occasion-left.png" alt="" class="occasion-left" />
          <img src="assets/occasion-mid.png" alt="" class="occasion-mid" />
          <img src="assets/occasion-right.png" alt="" class="occasion-right" />
          <p>From casual brunch to evening glam, we&apos;ve got you covered.</p>
        </div>

        <div class="card card-accessory">
          <h3>Accessory Pairing</h3>
          <img src="assets/accessory-large.png" alt="" class="acc-large" />
          <img src="assets/accessory-small-top.png" alt="" class="acc-small-top" />
          <img src="assets/accessory-dot.png" alt="" class="acc-dot" />
          <img src="assets/accessory-mid.png" alt="" class="acc-mid" />
          <img src="assets/accessory-right-tall.png" alt="" class="acc-right" />
          <p>Complete your outfit with perfectly matched accessories.</p>
        </div>
      </section>
    </main>
  </body>
</html>
